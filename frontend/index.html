<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Medical SAM3 — Lesion Detection</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #00c8ff;
    --accent-dim: #00c8ff33;
    --success: #3fb950;
    --warn: #d29922;
    --danger: #f85149;
    --radius: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .tag {
    font-size: 11px;
    background: var(--accent-dim);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 500;
  }
  header .health {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
  }
  header .health .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    margin-right: 4px;
    vertical-align: middle;
  }
  header .health .dot.ok { background: var(--success); }
  header .health .dot.err { background: var(--danger); }

  /* ── Layout ─────────────────────────────────── */
  .container {
    max-width: 1200px;
    margin: 24px auto;
    padding: 0 24px;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 24px;
  }
  @media (max-width: 860px) {
    .container { grid-template-columns: 1fr; }
  }

  /* ── Panel ──────────────────────────────────── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .panel h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  /* ── Upload ─────────────────────────────────── */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    margin-bottom: 16px;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .drop-zone img.preview {
    max-width: 100%;
    max-height: 200px;
    border-radius: 4px;
  }
  .drop-zone .placeholder { color: var(--text-dim); font-size: 14px; }

  /* ── Form controls ──────────────────────────── */
  label.field { display: block; margin-bottom: 14px; }
  label.field .label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  select, input[type="text"] {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 14px;
  }
  select:focus, input:focus { outline: none; border-color: var(--accent); }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
  .range-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); }

  /* ── Button ─────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { background: #33d4ff; }
  .btn-primary:disabled {
    opacity: .4;
    cursor: not-allowed;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid transparent;
    border-top-color: #000;
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Results ────────────────────────────────── */
  .result-image {
    width: 100%;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: #000;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .result-image img {
    max-width: 100%;
    display: block;
  }
  .result-image .empty {
    color: var(--text-dim);
    font-size: 14px;
  }
  .meta-bar {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .meta-bar span strong { color: var(--text); }

  /* ── Detection cards ────────────────────────── */
  .cards { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .card .idx {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    min-width: 32px;
    text-align: center;
  }
  .card .info { flex: 1; font-size: 13px; }
  .card .info .score-bar {
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    margin-top: 6px;
    overflow: hidden;
  }
  .card .info .score-bar .fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
  }
  .no-results { color: var(--text-dim); font-size: 14px; text-align: center; padding: 32px 0; }

  /* ── Error ──────────────────────────────────── */
  .error-box {
    background: #f8514922;
    border: 1px solid var(--danger);
    border-radius: 6px;
    padding: 12px;
    font-size: 13px;
    color: var(--danger);
    margin-top: 12px;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>Medical SAM3</h1>
  <span class="tag">Lesion Detection</span>
  <div class="health" id="health">
    <span class="dot" id="healthDot"></span>
    <span id="healthText">Connecting…</span>
  </div>
</header>

<div class="container">
  <!-- ─── Left Panel ───────────────────────── -->
  <div class="panel" id="controls">
    <h2>Input</h2>

    <div class="drop-zone" id="dropZone">
      <div class="placeholder" id="dropPlaceholder">
        Drop an ultrasound image here<br>or <strong>click to browse</strong>
      </div>
      <img class="preview" id="previewImg" style="display:none" />
    </div>
    <input type="file" id="fileInput" accept="image/*" hidden />

    <label class="field">
      <span class="label">Text prompt</span>
      <select id="promptSelect"></select>
    </label>

    <label class="field">
      <span class="label">…or custom prompt</span>
      <input type="text" id="customPrompt" placeholder="e.g. liver lesion" />
    </label>

    <label class="field">
      <span class="label">Confidence threshold</span>
      <input type="range" id="threshold" min="0.01" max="0.95" step="0.01" value="0.10" />
      <div class="range-row"><span>0.01</span><span id="thrVal">0.10</span><span>0.95</span></div>
    </label>

    <button class="btn btn-primary" id="runBtn" disabled>
      <span id="btnLabel">Segment</span>
    </button>

    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- ─── Right Panel ──────────────────────── -->
  <div>
    <div class="panel">
      <h2>Result</h2>
      <div class="result-image" id="resultBox">
        <span class="empty">Upload an image and click Segment</span>
      </div>
      <div class="meta-bar" id="metaBar" style="display:none">
        <span>Detections: <strong id="metaCount">0</strong></span>
        <span>Time: <strong id="metaTime">—</strong></span>
        <span>Size: <strong id="metaSize">—</strong></span>
      </div>
    </div>

    <div class="cards" id="cards"></div>
  </div>
</div>

<script>
// ── Elements ─────────────────────────────────────────────────────
const dropZone       = document.getElementById('dropZone');
const fileInput      = document.getElementById('fileInput');
const previewImg     = document.getElementById('previewImg');
const dropPlaceholder= document.getElementById('dropPlaceholder');
const promptSelect   = document.getElementById('promptSelect');
const customPrompt   = document.getElementById('customPrompt');
const threshold      = document.getElementById('threshold');
const thrVal         = document.getElementById('thrVal');
const runBtn         = document.getElementById('runBtn');
const btnLabel       = document.getElementById('btnLabel');
const resultBox      = document.getElementById('resultBox');
const metaBar        = document.getElementById('metaBar');
const metaCount      = document.getElementById('metaCount');
const metaTime       = document.getElementById('metaTime');
const metaSize       = document.getElementById('metaSize');
const cards          = document.getElementById('cards');
const errorBox       = document.getElementById('errorBox');
const healthDot      = document.getElementById('healthDot');
const healthText     = document.getElementById('healthText');

let selectedFile = null;
let running = false;

// ── Health check ─────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    healthDot.className = 'dot ok';
    healthText.textContent = d.model_loaded ? `Ready (${d.device})` : `Connected (model lazy)`;
  } catch {
    healthDot.className = 'dot err';
    healthText.textContent = 'Offline';
  }
}
checkHealth();
setInterval(checkHealth, 15000);

// ── Load prompts ─────────────────────────────────────────────────
(async () => {
  try {
    const r = await fetch('/prompts');
    const d = await r.json();
    d.prompts.forEach(p => {
      const o = document.createElement('option');
      o.value = p; o.textContent = p;
      promptSelect.appendChild(o);
    });
  } catch { /* will use custom prompt */ }
})();

// ── File handling ────────────────────────────────────────────────
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) loadFile(fileInput.files[0]); });

function loadFile(file) {
  selectedFile = file;
  const url = URL.createObjectURL(file);
  previewImg.src = url;
  previewImg.style.display = 'block';
  dropPlaceholder.style.display = 'none';
  runBtn.disabled = false;
  errorBox.style.display = 'none';
}

// ── Threshold slider ─────────────────────────────────────────────
threshold.addEventListener('input', () => { thrVal.textContent = parseFloat(threshold.value).toFixed(2); });

// ── Run inference ────────────────────────────────────────────────
runBtn.addEventListener('click', runInference);

async function runInference() {
  if (!selectedFile || running) return;
  running = true;
  errorBox.style.display = 'none';
  runBtn.disabled = true;
  btnLabel.innerHTML = '<span class="spinner"></span> Running…';

  const prompt = customPrompt.value.trim() || promptSelect.value || 'breast tumor';
  const fd = new FormData();
  fd.append('image', selectedFile);
  fd.append('prompt', prompt);
  fd.append('threshold', threshold.value);

  try {
    const resp = await fetch('/predict', { method: 'POST', body: fd });
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error || 'Unknown server error');
    renderResult(data);
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.style.display = 'block';
  } finally {
    running = false;
    runBtn.disabled = false;
    btnLabel.textContent = 'Segment';
  }
}

// ── Render ───────────────────────────────────────────────────────
function renderResult(data) {
  // Overlay image
  resultBox.innerHTML = `<img src="data:image/png;base64,${data.overlay_b64}" alt="Segmentation overlay" />`;
  metaBar.style.display = 'flex';
  metaCount.textContent = data.num_detections;
  metaTime.textContent  = `${data.elapsed_ms} ms`;
  metaSize.textContent  = `${data.image_size[0]}×${data.image_size[1]}`;

  // Cards
  cards.innerHTML = '';
  if (data.num_detections === 0) {
    cards.innerHTML = '<div class="no-results">No lesions detected at this threshold. Try lowering it.</div>';
    return;
  }

  data.scores.forEach((score, i) => {
    const box = data.boxes[i] || [];
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="idx">#${i + 1}</div>
      <div class="info">
        <div>Confidence: <strong>${(score * 100).toFixed(1)}%</strong></div>
        <div style="color:var(--text-dim)">Box: [${box.join(', ')}]</div>
        <div class="score-bar"><div class="fill" style="width:${score * 100}%"></div></div>
      </div>`;
    cards.appendChild(card);
  });
}
</script>
</body>
</html>
